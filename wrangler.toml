name = "eycareeros"
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]


[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cloudflare KV — persistent storage for the app state (set id after creating the namespace).
[[kv_namespaces]]
binding = "CAREER_OS_KV"
id = "3d8884f0ec2b40e59318b1358d518577"
